<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Blind Snake</h1>
        
        <div id="hud">
            <p id="score">Score: 0</p>
            <p id="snakePos">Snake Position: [0, 0]</p>
            <p id="snakeDir">Snake Direction: [1, 0]</p>
            <p id="applePos">Apple Position: [0, 0]</p>
        </div>

        <div class="canvas-wrapper">
             <canvas id="gameCanvas" width="400" height="400"></canvas>
             <div id="gameOverOverlay" class="hidden">
                 <h2>Game Over</h2>
                 <p>Restarting...</p>
             </div>
        </div>
        
        <div class="hints">
            <p>Use Arrow Keys or WASD to Move</p>
        </div>

        <footer>
            <p>Author: An-Che Liang</p>
            <p>Source Code: <a href="https://github.com/namwoam/mhci/tree/main/mini-project-1">Link</a></p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
