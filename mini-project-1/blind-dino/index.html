<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Deno</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Blind Deno</h1>
        <canvas id="gameCanvas" width="800" height="200"></canvas>
        <p>Clap to Jump (High Pitch)</p>
        <p>Slap/Thud to Duck (Low Pitch)</p>
        <p>Say "Start" to restart when Game Over</p>
        <p id="micStatus" style="color: red; font-weight: bold;">Click anywhere to start Microphone</p>
        <p id="score">Score: 0</p>
        <footer>
            <p>Author: An-Che Liang</p>
            <p>Source Code: <a href="https://github.com/namwoam/mhci/tree/main/mini-project-1/blind-dino">Link</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
